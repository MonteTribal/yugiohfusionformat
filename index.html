<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fusion Deck Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:    #c9a84c;
      --gold2:   #f0d080;
      --dark:    #0a0608;
      --surface: #12080e;
      --card-bg: #180d14;
      --border:  #3a2030;
      --red:     #9b1a2a;
      --text:    #e8dcc8;
      --muted:   #7a6a5a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'IM Fell English', serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Starfield background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, #2a0a1a 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, #0a0a2a 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 8%,  rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 5%,  rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 40%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 55%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  70%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 90%, rgba(255,255,255,.3) 0%, transparent 100%);
    }

    /* ── Layout ── */
    .container {
      position: relative; z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 24px 80px;
      display: flex; flex-direction: column; align-items: center; gap: 40px;
    }

    /* ── Header ── */
    header { text-align: center; }

    .eye-icon {
      width: 64px; height: 64px;
      margin: 0 auto 24px;
      animation: pulse-glow 3s ease-in-out infinite;
    }
    .eye-icon svg { width: 100%; height: 100%; }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 8px var(--gold)) drop-shadow(0 0 20px #9b1a2a88); }
      50%       { filter: drop-shadow(0 0 16px var(--gold2)) drop-shadow(0 0 40px #9b1a2acc); }
    }

    h1 {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 900;
      letter-spacing: .06em;
      background: linear-gradient(160deg, var(--gold2) 0%, var(--gold) 40%, #7a4020 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: .85rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      display: flex; align-items: center; gap: 16px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), var(--gold), var(--border), transparent);
    }
    .divider-gem {
      width: 10px; height: 10px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
      box-shadow: 0 0 12px var(--gold);
    }

    /* ── Upload panel ── */
    .panel {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 32px;
      position: relative;
      box-shadow: 0 8px 40px #00000080, inset 0 1px 0 #ffffff0a;
    }
    .panel::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 4px;
      background: linear-gradient(135deg, #ffffff05 0%, transparent 60%);
      pointer-events: none;
    }

    .panel-title {
      font-family: 'Cinzel', serif;
      font-size: .75rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    /* ── File badges ── */
    .file-badge {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px 14px;
      flex: 1; min-width: 180px;
    }
    .badge-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--muted);
      transition: background .3s;
    }
    .badge-dot.ok    { background: #6aaa30; box-shadow: 0 0 6px #6aaa3080; }
    .badge-dot.error { background: #c04040; }
    .badge-dot.loading {
      background: var(--gold);
      animation: blink .8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .badge-label {
      font-family: 'Cinzel', serif;
      font-size: .72rem; letter-spacing: .1em;
      color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .badge-dot.ok ~ .badge-label { color: var(--text); }

    /* ── Upload zones ── */
    .uploads { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }

    @media (max-width: 520px) { .uploads { grid-template-columns: 1fr; } }

    .upload-zone {
      border: 1px dashed var(--border);
      border-radius: 3px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .upload-zone:hover { border-color: var(--gold); background: #ffffff04; }
    .upload-zone.loaded { border-color: var(--gold); border-style: solid; }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .upload-label {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      display: block; margin-bottom: 6px;
    }
    .upload-status {
      font-size: .85rem;
      color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .upload-zone.loaded .upload-status { color: var(--gold); }

    /* ── Sample size ── */
    .controls { display: flex; align-items: center; gap: 16px; margin-bottom: 0; flex-wrap: wrap; }
    .controls:last-of-type { margin-bottom: 28px; }
    .control-label {
      font-family: 'Cinzel', serif;
      font-size: .7rem; letter-spacing: .15em; text-transform: uppercase;
      color: var(--muted); white-space: nowrap;
    }
    input[type=range] {
      flex: 1; min-width: 120px;
      accent-color: var(--gold);
      cursor: pointer;
    }
    .control-value {
      font-family: 'Cinzel', serif;
      font-size: .9rem; color: var(--gold2);
      min-width: 32px; text-align: right;
    }

    /* ── Button ── */
    .btn {
      display: block; width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #6a1020 0%, var(--red) 50%, #6a1020 100%);
      border: 1px solid #c0304880;
      border-radius: 3px;
      color: var(--gold2);
      font-family: 'Cinzel Decorative', cursive;
      font-size: .95rem;
      letter-spacing: .1em;
      cursor: pointer;
      transition: filter .2s, transform .1s;
      box-shadow: 0 4px 24px #9b1a2a44;
      position: relative; overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #ffffff10 0%, transparent 60%);
    }
    .btn:hover:not(:disabled) { filter: brightness(1.2); transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: .5; cursor: not-allowed; filter: none; transform: none; }

    /* ── Log ── */
    .log-panel {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
      max-height: 220px;
      overflow-y: auto;
      display: none;
      box-shadow: inset 0 2px 12px #00000060;
    }
    .log-panel.visible { display: block; }
    .log-panel::-webkit-scrollbar { width: 4px; }
    .log-panel::-webkit-scrollbar-track { background: transparent; }
    .log-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-line {
      font-size: .8rem; line-height: 1.7;
      color: var(--muted);
      font-family: 'Courier New', monospace;
    }
    .log-line.info  { color: var(--text); }
    .log-line.warn  { color: #c0a040; }
    .log-line.error { color: #c04040; }

    /* ── Result ── */
    .result-panel {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--gold);
      border-radius: 4px;
      padding: 28px 32px;
      text-align: center;
      display: none;
      box-shadow: 0 0 40px #c9a84c1a, inset 0 1px 0 #ffffff0a;
      animation: fade-in .5s ease;
    }
    .result-panel.visible { display: block; }

    @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .result-label {
      font-family: 'Cinzel', serif;
      font-size: .7rem; letter-spacing: .3em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 16px;
    }

    .result-link {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #1a2a0a, #2a4010);
      border: 1px solid #6a9a3080;
      border-radius: 3px;
      color: #a8d060;
      font-family: 'Cinzel Decorative', cursive;
      font-size: 1rem;
      letter-spacing: .05em;
      text-decoration: none;
      transition: filter .2s, transform .1s;
      box-shadow: 0 4px 20px #4a8a1040;
      margin-bottom: 16px;
    }
    .result-link:hover { filter: brightness(1.3); transform: translateY(-2px); }

    .result-stats {
      font-size: .82rem;
      color: var(--muted);
      line-height: 1.9;
    }
    .result-stats span { color: var(--text); font-style: italic; }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 1;
      text-align: center;
      font-size: .72rem;
      letter-spacing: .15em;
      color: #3a2a2a;
      padding-bottom: 32px;
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
    }
    footer a { color: #5a3a2a; text-decoration: none; }
    footer a:hover { color: var(--muted); }
  </style>
</head>
<body>
  <div class="stars"></div>

  <div class="container">
    <header>
      <div class="eye-icon">
        <!-- Eye of Anubis / occult sigil -->
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="32" cy="32" rx="30" ry="30" stroke="#c9a84c" stroke-width="1" opacity=".3"/>
          <ellipse cx="32" cy="32" rx="22" ry="22" stroke="#c9a84c" stroke-width="1" opacity=".2"/>
          <!-- Eye shape -->
          <path d="M8 32 Q20 14 32 14 Q44 14 56 32 Q44 50 32 50 Q20 50 8 32Z"
                stroke="#c9a84c" stroke-width="1.5" fill="none" opacity=".7"/>
          <!-- Iris -->
          <circle cx="32" cy="32" r="10" stroke="#c9a84c" stroke-width="1.2" fill="#1a0a14" opacity=".9"/>
          <!-- Pupil -->
          <circle cx="32" cy="32" r="5" fill="#c9a84c" opacity=".9"/>
          <circle cx="32" cy="32" r="2" fill="#f0d080"/>
          <!-- Rays -->
          <line x1="32" y1="2"  x2="32" y2="10" stroke="#c9a84c" stroke-width="1" opacity=".5"/>
          <line x1="32" y1="54" x2="32" y2="62" stroke="#c9a84c" stroke-width="1" opacity=".5"/>
          <line x1="2"  y1="32" x2="10" y2="32" stroke="#c9a84c" stroke-width="1" opacity=".5"/>
          <line x1="54" y1="32" x2="62" y2="32" stroke="#c9a84c" stroke-width="1" opacity=".5"/>
        </svg>
      </div>
      <h1>Fusion Deck Builder</h1>
      <p class="subtitle">Yu-Gi-Oh · Fusion Format · Random Oracle</p>
    </header>

    <div class="divider"><div class="divider-gem"></div></div>

    <div class="panel">
      <div class="panel-title">◈ Sacred Texts</div>

      <div class="file-status-row" style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
        <div class="file-badge" id="badge-fusion">
          <span class="badge-dot" id="dot-fusion"></span>
          <span class="badge-label" id="label-fusion">Loading fusion_cards.json…</span>
        </div>
        <div class="file-badge" id="badge-staples">
          <span class="badge-dot" id="dot-staples"></span>
          <span class="badge-label" id="label-staples">Loading staples…</span>
        </div>
      </div>

      <div class="controls">
        <span class="control-label">Fusion Cards Sampled</span>
        <input type="range" id="sample-size" min="5" max="40" value="20" step="1" />
        <span class="control-value" id="sample-display">20</span>
      </div>
      <div class="controls" style="margin-top:12px;">
        <span class="control-label">Staples Added</span>
        <input type="range" id="staples-count" min="0" max="30" value="15" step="1" />
        <span class="control-value" id="staples-display">15</span>
      </div>

      <button class="btn" id="run-btn" disabled>⬡ Summon the Deck ⬡</button>
    </div>

    <div class="log-panel" id="log-panel"></div>

    <div class="result-panel" id="result-panel">
      <div class="result-label">◈ Deck Constructed — Open the Portal</div>
      <a id="result-link" href="#" target="_blank" rel="noopener" class="result-link">
        ⚔ Open in YGOPRODeck Builder ⚔
      </a>
      <div class="result-stats" id="result-stats"></div>
    </div>
  </div>

  <footer>
    Created by <a href="https://github.com/MonteTribal/yugiohfusionformat" target="_blank">MonteTribal</a>
    · Licensed CC0 1.0 Universal
  </footer>

  <script>
  // ─────────────────────────────────────────────────────────────────────────────
  // Constants
  // ─────────────────────────────────────────────────────────────────────────────
  const API_BASE = "https://db.ygoprodeck.com/api/v7/cardinfo.php";
  const HEADERS  = { "Accept": "application/json" };

  const ATTRIBUTES = new Set(["DARK","LIGHT","EARTH","WIND","WATER","FIRE","DIVINE"]);
  const RACES      = new Set([
    "Dragon","Spellcaster","Zombie","Warrior","Beast-Warrior","Beast",
    "Winged Beast","Fiend","Fairy","Insect","Machine","Sea Serpent",
    "Aqua","Pyro","Rock","Thunder","Plant","Psychic","Reptile",
    "Dinosaur","Fish","Cyberse","Illusion","Gemini","Tuner","Normal",
  ]);
  const EXTRA_DECK_TYPES   = new Set(["Fusion","Synchro","Xyz","Link","Ritual","Pendulum"]);
  const EXTRA_DECK_FRAMES  = new Set(["fusion","synchro","xyz","link"]);
  const MAIN_DECK_TYPES    = [
    "Effect Monster","Flip Effect Monster","Flip Tuner Effect Monster",
    "Gemini Monster","Normal Monster","Normal Tuner Monster",
    "Pendulum Effect Monster","Pendulum Effect Ritual Monster",
    "Pendulum Flip Effect Monster","Pendulum Normal Monster",
    "Pendulum Tuner Effect Monster","Ritual Effect Monster",
    "Ritual Monster","Spell Card","Spirit Monster","Toon Monster",
    "Trap Card","Tuner Monster","Union Effect Monster",
  ];
  const POLYMERIZATION_ID  = 24094653;
  const QUOTED_RE          = /"([^"]+)"/g;

  // ─────────────────────────────────────────────────────────────────────────────
  // UI helpers
  // ─────────────────────────────────────────────────────────────────────────────
  const logPanel    = document.getElementById("log-panel");
  const resultPanel = document.getElementById("result-panel");
  const runBtn      = document.getElementById("run-btn");

  let fusionData  = null;
  let staplesData = null;

  // ── Auto-fetch JSON files from same repo ──────────────────────────────────
  function setBadge(which, state, text) {
    const dot   = document.getElementById(`dot-${which}`);
    const label = document.getElementById(`label-${which}`);
    dot.className   = "badge-dot " + state;
    label.textContent = text;
  }

  async function fetchJSON(path) {
    const resp = await fetch(path);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.json();
  }

  function extractCards(data) {
    if (Array.isArray(data)) return data;
    if (data && Array.isArray(data.data)) return data.data;
    return [];
  }

  async function loadRepoFiles() {
    // fusion_cards.json — required
    setBadge("fusion", "loading", "Loading fusion_cards.json…");
    try {
      const data = await fetchJSON("fusion_cards.json");
      fusionData = extractCards(data);
      setBadge("fusion", "ok", `fusion_cards.json  (${fusionData.length} cards)`);
    } catch(e) {
      setBadge("fusion", "error", `fusion_cards.json — not found`);
    }

    // staples — optional
    setBadge("staples", "loading", "Loading staples…");
    try {
      const data = await fetchJSON("fusion_spell_trap_staples.json");
      staplesData = extractCards(data);
      setBadge("staples", "ok", `staples  (${staplesData.length} cards)`);
    } catch(e) {
      setBadge("staples", "error", "staples — not found (optional)");
    }

    updateRunBtn();
  }

  loadRepoFiles();

  function log(msg, cls = "") {
    logPanel.classList.add("visible");
    const line = document.createElement("div");
    line.className = "log-line " + cls;
    line.textContent = msg;
    logPanel.appendChild(line);
    logPanel.scrollTop = logPanel.scrollHeight;
  }

  function clearLog() {
    logPanel.innerHTML = "";
    logPanel.classList.remove("visible");
    resultPanel.classList.remove("visible");
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // File loading
  // ─────────────────────────────────────────────────────────────────────────────
  function updateRunBtn() {
    runBtn.disabled = !fusionData;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // Range sliders
  // ─────────────────────────────────────────────────────────────────────────────
  const sampleInput  = document.getElementById("sample-size");
  const sampleDisp   = document.getElementById("sample-display");
  const staplesInput = document.getElementById("staples-count");
  const staplesDisp  = document.getElementById("staples-display");

  sampleInput.addEventListener("input",  () => sampleDisp.textContent  = sampleInput.value);
  staplesInput.addEventListener("input", () => staplesDisp.textContent = staplesInput.value);

  // ─────────────────────────────────────────────────────────────────────────────
  // Segment classification (mirrors Python Segment class)
  // ─────────────────────────────────────────────────────────────────────────────
  function classifySegment(raw) {
    raw = raw.trim();
    const seg = { raw, kind: null, name: null, archetype: null,
                  attribute: null, race: null, extraType: null };

    const quoted = [];
    let m;
    const re = /"([^"]+)"/g;
    while ((m = re.exec(raw)) !== null) quoted.push(m[1].trim());
    const outside = raw.replace(/"([^"]+)"/g, "").trim().replace(/^[+,\s]+|[+,\s]+$/g, "");

    if (quoted.length === 0) {
      seg.kind = "generic";
      extractGeneric(seg, raw);
    } else if (outside && /\b(monster|card|fusion|synchro|xyz|link)\b/i.test(outside)) {
      seg.kind      = "archetype";
      seg.archetype = quoted[0];
      extractGeneric(seg, outside);
    } else {
      seg.kind = "exact";
      seg.name = quoted[0];
    }
    return seg;
  }

  function extractGeneric(seg, text) {
    for (const w of text.split(/[\s\-\/]+/)) {
      const clean = w.replace(/[.,]/g, "");
      if (ATTRIBUTES.has(clean.toUpperCase()))           seg.attribute = clean.toUpperCase();
      const cap = clean.charAt(0).toUpperCase() + clean.slice(1).toLowerCase();
      if (RACES.has(cap))                                seg.race = cap;
      if (EXTRA_DECK_TYPES.has(cap))                     seg.extraType = cap;
    }
  }

  function parseSegments(firstLine) {
    return firstLine
      .split(/\s*\+\s*/)
      .map(p => p.trim())
      .filter(p => p && !p.startsWith("["))
      .map(classifySegment);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // API helpers
  // ─────────────────────────────────────────────────────────────────────────────
  async function apiQuery(params) {
    const qs = new URLSearchParams(params).toString();
    const url = `${API_BASE}?${qs}`;
    try {
      const resp = await fetch(url, { headers: HEADERS });
      if (resp.status === 400) return [];
      if (!resp.ok) { log(`API HTTP ${resp.status}`, "warn"); return []; }
      const data = await resp.json();
      return (data.data || []).slice(0, 3);
    } catch(e) {
      log(`API error: ${e.message}`, "warn");
      return [];
    }
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function searchSegment(seg) {
    if (seg.kind === "exact") return [];
    const params = {};
    if (seg.kind === "archetype") {
      params.archetype = seg.archetype;
      if (seg.attribute) params.attribute = seg.attribute;
      if (seg.race)      params.race = seg.race;
    } else {
      if (seg.attribute) params.attribute = seg.attribute;
      if (seg.race)      params.race = seg.race;
      if (seg.extraType) {
        params.type = `${seg.extraType} Monster`;
      } else {
        params.type = MAIN_DECK_TYPES[Math.floor(Math.random() * MAIN_DECK_TYPES.length)];
      }
    }
    if (Object.keys(params).length === 0) return [];
    await sleep(100);
    return apiQuery(params);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // Registry
  // ─────────────────────────────────────────────────────────────────────────────
  function register(collected, card, source) {
    const cid = card.id ?? card.name ?? "unknown";
    if (!collected.has(cid)) collected.set(cid, { card, sources: new Set() });
    collected.get(cid).sources.add(source);
  }

  function registerExact(collected, name) {
    const key = `exact::${name}`;
    if (!collected.has(key))
      collected.set(key, { card: { name, type: "—", atk: "—", def: "—" }, sources: new Set() });
    collected.get(key).sources.add("exact material");
  }

  function isFusion(card) { return (card.type || "").toLowerCase().includes("fusion"); }

  // ─────────────────────────────────────────────────────────────────────────────
  // Material resolution
  // ─────────────────────────────────────────────────────────────────────────────
  async function resolveMaterials(card, collected) {
    const desc = card.desc || "";
    const firstLine = desc.split("\n")[0].trim();
    for (const seg of parseSegments(firstLine)) {
      if (seg.kind === "exact") {
        registerExact(collected, seg.name);
        continue;
      }
      const results = await searchSegment(seg);
      const source = seg.kind === "archetype"
        ? `archetype "${seg.archetype}"`
        : `generic (${seg.attribute || ""}${seg.race ? " " + seg.race : ""})`;
      for (const fc of results) register(collected, fc, source);
    }

    // "Must be Special Summoned with" check
    const summonRe = /must (?:first )?be special summoned with (.+?)(?:\.|$)/gi;
    let m;
    while ((m = summonRe.exec(desc)) !== null) {
      const snippet = m[0];
      const nameRe = /"([^"]+)"/g;
      let nm;
      while ((nm = nameRe.exec(snippet)) !== null) {
        const name = nm[1];
        if (name.length < 2 || name.includes(". ")) continue;
        registerExact(collected, name);
      }
    }
  }

  function sampleArray(arr, n) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy.slice(0, Math.min(n, copy.length));
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // Main run
  // ─────────────────────────────────────────────────────────────────────────────
  runBtn.addEventListener("click", async () => {
    clearLog();
    runBtn.disabled = true;
    runBtn.textContent = "⏳ Weaving the Spell...";

    const SAMPLE_SIZE   = parseInt(sampleInput.value);
    const STAPLES_COUNT = parseInt(staplesInput.value);

    try {
      log("⬡ Selecting fusion cards...", "info");
      const sample = sampleArray(fusionData, SAMPLE_SIZE);
      log(`  Selected ${sample.length} fusion cards.`);

      const collected = new Map();

      // Initial pass
      for (const card of sample) {
        register(collected, card, "fusion selection");
        log(`  ▸ ${card.name}`);
        await resolveMaterials(card, collected);
      }

      // Recursive passes
      const resolvedIds = new Set(
        [...collected.values()]
          .filter(e => e.sources.has("fusion selection"))
          .map(e => e.card.id)
          .filter(Boolean)
      );

      let iteration = 0;
      while (true) {
        const pending = [...collected.values()]
          .filter(e => isFusion(e.card) && !resolvedIds.has(e.card.id) && e.card.id != null);
        if (!pending.length) break;
        iteration++;
        log(`  ↺ Pass ${iteration}: resolving ${pending.length} nested fusion(s)...`, "info");
        for (const { card } of pending) {
          resolvedIds.add(card.id);
          await resolveMaterials(card, collected);
        }
      }

      // Resolve exact-name placeholders
      const placeholders = [...collected.entries()].filter(([, e]) => e.card.type === "—");
      if (placeholders.length) {
        log(`  ◈ Resolving ${placeholders.length} exact-name card(s)...`);
        for (const [key, entry] of placeholders) {
          const name = entry.card.name;
          const results = await apiQuery({ name });
          if (results.length) {
            const full = results[0];
            entry.card = full;
            const newId = full.id;
            if (newId && !collected.has(newId)) { collected.set(newId, entry); collected.delete(key); }
          }
          await sleep(100);
        }
      }

      // Staples
      let stapleIds = [];
      if (staplesData && staplesData.length && STAPLES_COUNT > 0) {
        const staplesSample = sampleArray(staplesData, STAPLES_COUNT);
        log(`  ◇ Adding ${staplesSample.length} staple(s)...`);
        stapleIds = staplesSample.map(c => c.id).filter(Boolean);
      }

      // Build decks
      const mainDeck  = [];
      const extraDeck = [];

      for (const { card } of collected.values()) {
        const cid = card.id;
        if (!cid || typeof cid !== "number") continue;
        const frame = (card.frameType || "").toLowerCase();
        const ctype = (card.type || "").toLowerCase();
        if (ctype.includes("skill") || frame.includes("skill")) continue;
        if (ctype.includes("token") || frame.includes("token")) continue;
        const isExtra = [...EXTRA_DECK_FRAMES].some(t => frame.includes(t))
                     || [...EXTRA_DECK_FRAMES].some(t => ctype.includes(t));
        if (isExtra) extraDeck.push(cid);
        else         mainDeck.push(cid);
      }

      // Dedupe
      const uniqueMain  = [...new Set(mainDeck)];
      const uniqueExtra = [...new Set(extraDeck)];

      // Add staples (skip duplicates)
      for (const id of stapleIds) {
        if (!uniqueMain.includes(id)) uniqueMain.push(id);
      }

      // Always add 3x Polymerization
      uniqueMain.push(POLYMERIZATION_ID, POLYMERIZATION_ID, POLYMERIZATION_ID);

      // Encode
      function encode(lst) {
        const json = JSON.stringify(lst);
        return encodeURIComponent(btoa(json));
      }

      const url = `https://ygoprodeck.com/deckbuilder/?main_deck=${encode(uniqueMain)}&extra_deck=${encode(uniqueExtra)}`;

      // Stats
      const allEntries = [...collected.values()];
      const fusionSel  = allEntries.filter(e => e.sources.has("fusion selection"));
      const nestedF    = allEntries.filter(e => isFusion(e.card) && !e.sources.has("fusion selection"));
      const plains     = allEntries.filter(e => !isFusion(e.card) && !e.sources.has("fusion selection") && e.card.type !== "—");
      const exacts     = allEntries.filter(e => e.card.type === "—");

      log("", "");
      log(`✓ Done! Main: ${uniqueMain.length} | Extra: ${uniqueExtra.length}`, "info");

      document.getElementById("result-link").href = url;
      document.getElementById("result-stats").innerHTML = `
        Fusion selected: <span>${fusionSel.length}</span> &nbsp;·&nbsp;
        Nested fusions: <span>${nestedF.length}</span><br/>
        Main deck: <span>${uniqueMain.length} cards</span> &nbsp;·&nbsp;
        Extra deck: <span>${uniqueExtra.length} cards</span><br/>
        Recursive passes: <span>${iteration}</span> &nbsp;·&nbsp;
        Total unique: <span>${allEntries.length}</span>
      `;
      resultPanel.classList.add("visible");

    } catch(err) {
      log("Fatal error: " + err.message, "error");
      console.error(err);
    }

    runBtn.disabled = false;
    runBtn.textContent = "⬡ Summon the Deck ⬡";
    updateRunBtn();
  });
  </script>
</body>
